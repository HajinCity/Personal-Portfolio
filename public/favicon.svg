<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="wing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#48CAE4"/>
      <stop offset="50%" stop-color="#0096C7"/>
      <stop offset="100%" stop-color="#03045E"/>
    </linearGradient>
  </defs>

  <!-- body -->
  <ellipse cx="32" cy="32" rx="1.8" ry="14" fill="#03045E"/>
  <!-- antennae -->
  <path d="M31 19 C 29 15, 27 13, 25 12" stroke="#03045E" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M33 19 C 35 15, 37 13, 39 12" stroke="#03045E" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <circle cx="25" cy="12" r="1.3" fill="#03045E"/>
  <circle cx="39" cy="12" r="1.3" fill="#03045E"/>

  <!-- left upper wing -->
  <path d="M31 22 C 18 12, 6 14, 5 24 C 4 33, 16 35, 31 28 Z" fill="url(#wing)"/>
  <!-- left lower wing -->
  <path d="M31 30 C 21 32, 12 40, 15 48 C 18 54, 27 50, 31 38 Z" fill="url(#wing)" opacity="0.9"/>
  <!-- right upper wing -->
  <path d="M33 22 C 46 12, 58 14, 59 24 C 60 33, 48 35, 33 28 Z" fill="url(#wing)"/>
  <!-- right lower wing -->
  <path d="M33 30 C 43 32, 52 40, 49 48 C 46 54, 37 50, 33 38 Z" fill="url(#wing)" opacity="0.9"/>

  <!-- wing spots -->
  <circle cx="16" cy="22" r="2.2" fill="#CAF0F8"/>
  <circle cx="48" cy="22" r="2.2" fill="#CAF0F8"/>
  <circle cx="22" cy="42" r="1.6" fill="#CAF0F8"/>
  <circle cx="42" cy="42" r="1.6" fill="#CAF0F8"/>
</svg>
